<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Project Master Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --row-height: 40px;
            --label-width: 380px;
            /* Refined Utility Palette */
            --primary-blue: #005a9c;
            --secondary-green: #388e3c;
            --bg-slate: #f8fafc;
            --border-light: #e2e8f0;
        }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #334155;
            -webkit-font-smoothing: antialiased;
        }

        .gantt-wrapper {
            display: flex;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            overflow: hidden;
            background: white;
            width: 100%;
        }

        .labels-column {
            width: var(--label-width);
            min-width: var(--label-width);
            border-right: 1px solid var(--border-light);
            z-index: 20;
            background: white;
        }

        .timeline-column {
            flex-grow: 1;
            overflow-x: hidden;
            position: relative;
        }

        .header-container {
            background: #ffffff;
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 30;
        }

        .year-header {
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 500;
            background: var(--primary-blue);
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .month-header {
            height: 36px;
            display: flex;
            align-items: center;
            background: #fff;
        }

        .month-cell {
            flex: 1;
            height: 100%;
            border-right: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 500;
            color: #64748b;
            text-transform: uppercase;
        }

        .data-row {
            height: var(--row-height);
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.1s;
            /* Added padding between content and the right border/separator */
            padding-right: 12px;
        }

        .data-row:hover {
            background-color: #f1f5f9;
        }

        .timeline-row {
            width: 100%;
            position: relative;
            background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px);
        }

        .gantt-bar {
            position: absolute;
            height: 22px;
            top: 9px;
            border-radius: 3px;
            font-size: 0.7rem;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 8px;
            z-index: 5;
            white-space: nowrap;
            font-weight: 400;
        }

        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            background: rgba(0,0,0,0.15);
            z-index: -1;
        }

        /* Hierarchy Styles - Adjusted padding to keep space from the vertical borders */
        .level-0 { 
            font-weight: 500; 
            color: #1e293b; 
            background: #f1f5f9; 
            border-left: 4px solid var(--primary-blue); 
            padding-left: 12px; 
        }
        .level-1 { 
            font-weight: 400; 
            padding-left: 2rem; 
            color: #334155; 
        }
        .level-2 { 
            padding-left: 3.25rem; 
            color: #64748b; 
            font-size: 0.8rem; 
        }

        .type-sustainment { background-color: #0284c7; }
        .type-innovation { background-color: #16a34a; }
        .type-project { background-color: #94a3b8; }
        .type-milestone { background-color: #cbd5e1; color: #475569; }

        .collapsed-view { display: none !important; }
        
        .toggle-btn {
            width: 16px;
            height: 16px;
            min-width: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            cursor: pointer;
            border-radius: 3px;
            background: #e2e8f0;
            color: #64748b;
            font-size: 8px;
            transition: background 0.2s;
        }
        .toggle-btn:hover { background: #cbd5e1; }
        .rotate-icon { transform: rotate(90deg); }

        .custom-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: #475569;
        }
        .custom-checkbox input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--secondary-green);
        }

        select, input[type="file"] {
            border: 1px solid var(--border-light);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            background: white;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-full mx-auto p-3 md:p-6">
        <header class="mb-6 flex flex-wrap justify-between items-center gap-6 bg-white p-5 rounded-lg border border-slate-200 shadow-sm">
            <div class="flex items-center gap-4">
                <div class="px-2 py-1 bg-[#005a9c] text-white font-medium italic rounded-sm text-lg">Heat</div>
                <div>
                    <h1 class="text-lg font-medium text-slate-900 leading-tight">Master Schedule</h1>
                    <p class="text-slate-500 font-normal text-[10px] tracking-wide uppercase">Infrastructure & Operations</p>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center gap-10">
                <div class="flex flex-col">
                    <span class="text-[10px] uppercase font-medium text-slate-400 mb-1">Import</span>
                    <input type="file" id="csvFileInput" accept=".csv">
                </div>
                
                <div class="flex flex-col">
                    <span class="text-[10px] uppercase font-medium text-slate-400 mb-1">Fiscal Range</span>
                    <select id="yearSelect">
                        <option value="ALL">All Dates</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                    </select>
                </div>

                <div class="flex gap-8 items-center pt-3">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="collapseProjects">
                        Projects
                    </label>
                    <label class="custom-checkbox">
                        <input type="checkbox" id="collapseMiles">
                        Milestones
                    </label>
                </div>
            </div>
        </header>

        <div id="ganttContainer" class="hidden">
            <div class="gantt-wrapper">
                <div class="labels-column">
                    <div class="header-container">
                        <div class="year-header">Organization</div>
                        <div class="month-header px-4 text-[9px] font-medium uppercase text-slate-400 tracking-wider">Project Structure</div>
                    </div>
                    <div id="labelsBody"></div>
                </div>

                <div class="timeline-column">
                    <div class="header-container">
                        <div class="year-header" id="yearTitle">Program Timeline</div>
                        <div class="month-header" id="monthHeader"></div>
                    </div>
                    <div id="timelineBody" class="timeline-row"></div>
                </div>
            </div>
            
            <div class="mt-4 flex flex-wrap gap-8 text-[10px] font-medium uppercase text-slate-500 bg-white px-5 py-3 rounded-lg border border-slate-200 shadow-sm">
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-sm type-sustainment"></span> Sustainment</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-sm type-innovation"></span> Innovation</div>
                <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-sm type-project"></span> Parent</div>
            </div>
        </div>

        <div id="emptyState" class="bg-white border border-dashed border-slate-300 rounded-xl p-32 text-center mt-12 shadow-sm">
            <h3 class="text-slate-900 font-medium text-lg">System Ready</h3>
            <p class="text-slate-400 text-sm mt-1">Upload a CSV schedule to begin visualization.</p>
        </div>
    </div>

    <script>
        let rawData = [];
        let timeBounds = { min: null, max: null };

        // Load CSV data and initialize Gantt
        function loadCSVData(csvData) {
            rawData = csvData.filter(r => r['Start Date'] && r['End Date']);
            initGantt();
        }

        // Auto-load default CSV file on page load
        fetch('Project Schedule - data2.csv')
            .then(response => response.ok ? response.text() : Promise.reject())
            .then(csvText => {
                Papa.parse(csvText, {
                    header: true,
                    dynamicTyping: true,
                    skipEmptyLines: true,
                    complete: res => loadCSVData(res.data)
                });
            })
            .catch(() => {
                // Silent fail if CSV doesn't exist - user can upload manually
                console.log('No default CSV found, waiting for manual upload');
            });

        document.getElementById('csvFileInput').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            Papa.parse(file, {
                header: true,
                dynamicTyping: true,
                skipEmptyLines: true,
                complete: res => {
                    loadCSVData(res.data);
                }
            });
        });

        document.getElementById('yearSelect').addEventListener('change', initGantt);
        document.getElementById('collapseProjects').addEventListener('change', updateVisibility);
        document.getElementById('collapseMiles').addEventListener('change', updateVisibility);

        function updateVisibility() {
            const pClosed = document.getElementById('collapseProjects').checked;
            const mClosed = document.getElementById('collapseMiles').checked;
            const allRows = document.querySelectorAll('.data-row');
            
            allRows.forEach(row => {
                const level = parseInt([...row.classList].find(c => c.startsWith('level-'))?.split('-')[1]);
                row.classList.remove('collapsed-view');
                if (pClosed && level > 0) row.classList.add('collapsed-view');
                else if (mClosed && level > 1) row.classList.add('collapsed-view');
            });
        }

        function initGantt() {
            if (!rawData.length) return;
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('ganttContainer').classList.remove('hidden');

            const yearVal = document.getElementById('yearSelect').value;
            const isAll = yearVal === 'ALL';
            
            if (isAll) {
                let min = new Date(8640000000000000);
                let max = new Date(-8640000000000000);
                rawData.forEach(r => {
                    const s = new Date(r['Start Date']);
                    const e = new Date(r['End Date']);
                    if (s < min) min = s;
                    if (e > max) max = e;
                });
                timeBounds.min = new Date(min.getFullYear(), min.getMonth(), 1);
                timeBounds.max = new Date(max.getFullYear(), max.getMonth() + 1, 0);
                document.getElementById('yearTitle').innerText = `${timeBounds.min.getFullYear()} - ${timeBounds.max.getFullYear()} Timeline`;
            } else {
                const year = parseInt(yearVal);
                timeBounds.min = new Date(year, 0, 1);
                timeBounds.max = new Date(year, 11, 31, 23, 59, 59);
                document.getElementById('yearTitle').innerText = `FY ${year} Operations`;
            }
            
            const header = document.getElementById('monthHeader');
            header.innerHTML = '';
            const monthCount = (timeBounds.max.getFullYear() - timeBounds.min.getFullYear()) * 12 + (timeBounds.max.getMonth() - timeBounds.min.getMonth()) + 1;
            
            for (let i = 0; i < monthCount; i++) {
                const d = new Date(timeBounds.min.getFullYear(), timeBounds.min.getMonth() + i, 1);
                const div = document.createElement('div');
                div.className = 'month-cell';
                div.innerText = d.toLocaleString('default', { month: 'short' }) + (isAll ? ` '${d.getFullYear().toString().slice(-2)}` : '');
                header.appendChild(div);
            }

            document.getElementById('timelineBody').style.backgroundSize = `${100 / monthCount}% 100%`;

            const projects = {};
            rawData.forEach(row => {
                const start = new Date(row['Start Date']);
                const end = new Date(row['End Date']);
                if (!isAll && start.getFullYear() !== parseInt(yearVal) && end.getFullYear() !== parseInt(yearVal)) return;

                const pName = row['Project Name'];
                const mName = row['Milestone'];

                if (!projects[pName]) projects[pName] = { name: pName, start, end, progress: 0, count: 0, milestones: {} };
                if (!projects[pName].milestones[mName]) projects[pName].milestones[mName] = { name: mName, start, end, progress: 0, count: 0, tasks: [] };

                if (start < projects[pName].start) projects[pName].start = start;
                if (end > projects[pName].end) projects[pName].end = end;
                if (start < projects[pName].milestones[mName].start) projects[pName].milestones[mName].start = start;
                if (end > projects[pName].milestones[mName].end) projects[pName].milestones[mName].end = end;

                projects[pName].progress += (row['Progress'] || 0);
                projects[pName].count++;
                projects[pName].milestones[mName].progress += (row['Progress'] || 0);
                projects[pName].milestones[mName].count++;
                projects[pName].milestones[mName].tasks.push({
                    name: row['Task Name'], start, end, progress: row['Progress'] || 0, type: row['Type']?.toLowerCase() || 'sustainment'
                });
            });

            const labelsBody = document.getElementById('labelsBody');
            const timelineBody = document.getElementById('timelineBody');
            labelsBody.innerHTML = '';
            timelineBody.innerHTML = '';

            let rowCounter = 0;
            Object.values(projects).sort((a,b) => a.start - b.start).forEach(proj => {
                const pId = `p-${rowCounter++}`;
                renderRow(proj.name, proj.start, proj.end, Math.round(proj.progress/proj.count), 0, 'project', pId, null);
                
                Object.values(proj.milestones).sort((a,b) => a.start - b.start).forEach(mile => {
                    const mId = `m-${rowCounter++}`;
                    renderRow(mile.name, mile.start, mile.end, Math.round(mile.progress/mile.count), 1, 'milestone', mId, pId);
                    
                    mile.tasks.sort((a,b) => a.start - b.start).forEach(task => {
                        renderRow(task.name, task.start, task.end, task.progress, 2, task.type, null, mId);
                        rowCounter++;
                    });
                });
            });
            updateVisibility();
        }

        function renderRow(name, start, end, progress, level, type, id, parentId) {
            const labelsBody = document.getElementById('labelsBody');
            const timelineBody = document.getElementById('timelineBody');

            const lRow = document.createElement('div');
            lRow.className = `data-row level-${level}`;
            if (parentId) lRow.dataset.parent = parentId;
            if (id) lRow.id = `label-${id}`;

            const toggle = document.createElement('div');
            toggle.className = 'toggle-btn';
            if (level < 2) {
                toggle.innerHTML = '▼';
                toggle.classList.add('rotate-icon');
                toggle.onclick = () => {
                    const btn = lRow.querySelector('.toggle-btn');
                    const isClosing = btn.classList.contains('rotate-icon');
                    btn.classList.toggle('rotate-90');
                    btn.classList.toggle('rotate-icon');
                    document.querySelectorAll(`[data-parent="${id}"]`).forEach(c => c.classList.toggle('collapsed-view', isClosing));
                };
            }
            
            const nameSpan = document.createElement('span');
            nameSpan.className = 'truncate px-2';
            nameSpan.innerText = name;
            lRow.appendChild(toggle);
            lRow.appendChild(nameSpan);
            labelsBody.appendChild(lRow);

            const tRow = document.createElement('div');
            tRow.className = `data-row timeline-row level-${level}`;
            if (parentId) tRow.dataset.parent = parentId;

            const totalRange = timeBounds.max - timeBounds.min;
            let xStart = Math.max(0, Math.min(100, ((start - timeBounds.min) / totalRange) * 100));
            let xEnd = Math.max(0, Math.min(100, ((end - timeBounds.min) / totalRange) * 100));
            const width = Math.max(0.5, xEnd - xStart);

            if (width > 0 && xStart < 100) {
                const bar = document.createElement('div');
                bar.className = `gantt-bar type-${type}`;
                bar.style.left = `${xStart}%`;
                bar.style.width = `${width}%`;
                
                const fill = document.createElement('div');
                fill.className = 'progress-fill';
                fill.style.width = `${progress}%`;
                
                const label = document.createElement('span');
                label.innerText = `${progress}%`;
                
                bar.appendChild(fill);
                bar.appendChild(label);
                tRow.appendChild(bar);
            }
            timelineBody.appendChild(tRow);
        }
    </script>
</body>
</html>
